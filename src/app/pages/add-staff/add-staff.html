<app-header></app-header>
<div class="add-staff-wrapper">
  <div class="con">
    <h2>เพิ่มข้อมูลเจ้าหน้าที่</h2>

    <input type="text" placeholder="ชื่อ-นามสกุล" [(ngModel)]="fullName" />
    <input type="text" placeholder="เลขบัตรประชาชน" [(ngModel)]="s_citizenId" />
    <input type="date" [(ngModel)]="birthDate" />

    <select [(ngModel)]="gender">
      <option value="">เลือกเพศ</option>
      <option value="male">ชาย</option>
      <option value="female">หญิง</option>
      <option value="other">อื่นๆ</option>
    </select>

    <input type="file" (change)="onFileSelected($event)" />

    <input type="text" placeholder="เบอร์โทรศัพท์" [(ngModel)]="phone" />
    <input type="email" placeholder="อีเมล" [(ngModel)]="email" />
    <input type="text" placeholder="ที่อยู่ปัจจุบัน" [(ngModel)]="address" />

    <input type="password" placeholder="รหัสผ่าน" [(ngModel)]="password" />
    <input
      type="password"
      placeholder="ยืนยันรหัสผ่าน"
      [(ngModel)]="confirmPassword"
    />

    <button (click)="onAddStaff()">เพิ่มข้อมูล</button>
  </div>
</div>
