<app-header></app-header>

<div class="edit-page">
  <form class="edit-form" #editform="ngForm" (ngSubmit)="saveStaff()">
    <div class="form-header">
      <div>
        <p class="eyebrow">Staff Management</p>
        <h1>Edit Staff</h1>
      </div>
    </div>

    <div class="form-grid">
      <label>
        ชื่อ-นามสกุล
        <input
          type="text"
          name="fullName"
          [(ngModel)]="staff.fullName"
          #fullName="ngModel"
          required
        />
        <div
        class="error"
        *ngIf="fullName.invalid && fullName.touched"
      >
        กรุณากรอกชื่อ
      </div>
      </label>

      <label>
        เลขบัตรประชาชน
        <input
          type="text"
          name="citizenId"
          [(ngModel)]="staff.s_citizenId"
          disabled
        />
      </label>

      <label>
        วันเดือนปีเกิด
        <input type="date" name="birthDate" [(ngModel)]="staff.birthDate" />
      </label>

      <label>
        เพศ
        <select name="gender" [(ngModel)]="staff.gender">
          <option value="">เลือกเพศ</option>
          <option value="male">ชาย</option>
          <option value="female">หญิง</option>
          <option value="other">อื่นๆ</option>
        </select>
      </label>

      <label>
        Email
        <input type="email" name="email" [(ngModel)]="staff.email" required />
      </label>

      <label>
        เบอร์ติดต่อ
        <input type="tel" name="phone" [(ngModel)]="staff.phone" required/>
      </label>

      <label>
        ตำแหน่งที่รับผิดชอบ
        <input type="text" name="position" [(ngModel)]="staff.position" disabled />
      </label>

      <label>
        รหัสผ่าน
        <input type="text" name="password" [(ngModel)]="staff.password" required/>
      </label>

      <label class="full">
        ที่อยู่
        <textarea name="address" [(ngModel)]="staff.address"></textarea>
      </label>
    </div>

    <div class="actions">
      <button type="button" class="secondary" (click)="cancel()">ยกเลิก</button>
      <button type="submit" [disabled]="editform.invalid || saving">
        บันทึกข้อมูล
      </button>
    </div>
  </form>
</div>
