<app-header></app-header>

<div class="staff-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Staff Management</p>
      <h1>Staff List</h1>
    </div>

    <input type="text" placeholder="Search staff" (input)="search($event)" />
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Full name</th>
          <th>Citizen ID</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Gender</th>
          <th>Birth date</th>
          <th>Position</th>
          <th>Address</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let staff of staffs$ | async">
          <td>{{ staff.fullName }}</td>
          <td>{{ staff.citizenId }}</td>
          <td>{{ staff.email }}</td>
          <td>{{ staff.phone }}</td>
          <td>{{ staff.gender }}</td>
          <td>{{ staff.birthDate }}</td>
          <td>
            <span class="position">{{ staff.position }}</span>
          </td>
          <td class="address">{{ staff.address }}</td>
          <td class="actions">
            <button type="button" (click)="editStaff(staff)">Edit</button>
          </td>
        </tr>

        <tr *ngIf="(staffs$ | async)?.length === 0">
          <td colspan="9" class="empty">No staff data found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
